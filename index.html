<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web App Monitoring Dashboard</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #0f172a;
            color: white;
        }

        header {
            background: #1e293b;
            padding: 20px;
            text-align: center;
        }

        h1 {
            margin: 0;
        }

        .container {
            padding: 20px;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            margin: 15px 0;
            border-radius: 10px;
        }

        .status {
            font-size: 20px;
            font-weight: bold;
        }

        .online {
            color: #22c55e;
        }

        .metric {
            font-size: 18px;
        }

        button {
            padding: 10px 15px;
            background: #3b82f6;
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #2563eb;
        }
    </style>

    <!-- 🔥 APPLICATION INSIGHTS (PASTE YOUR KEY HERE) -->
    <script>
        var appInsights=window.appInsights||function(a){
            function b(a){c[a]=function(){var b=arguments;c.queue.push(function(){c[a].apply(c,b)})}}
            var c={config:a},d=document,e=window;
            setTimeout(function(){
                var b=d.createElement("script");
                b.src="https://az416426.vo.msecnd.net/scripts/a/ai.0.js";
                d.getElementsByTagName("head")[0].appendChild(b)
            });
            try{c.cookie=d.cookie}catch(a){}
            c.queue=[];
            for(var f=["trackEvent","trackPageView","trackException"],g=0;g<f.length;g++)b(f[g]);
            return c
        }({
            connectionString: "InstrumentationKey=4ab5f003-8d7a-45df-89ee-8c8b73bf60d6;IngestionEndpoint=https://eastasia-0.in.applicationinsights.azure.com/;LiveEndpoint=https://eastasia.livediagnostics.monitor.azure.com/;ApplicationId=cbeb435c-fb1f-452f-a48a-c50f3eca2c9d"
        });

        window.appInsights=appInsights;
        appInsights.trackPageView();
    </script>

</head>

<body>

<header>
    <h1>🚀 Azure Web App Monitoring Dashboard</h1>
</header>

<div class="container">

    <div class="card">
        <div class="status online">🟢 Application Status: Running</div>
    </div>

    <div class="card">
        <div class="metric">👥 Visitors: <span id="visits">0</span></div>
    </div>

    <div class="card">
        <div class="metric">⚡ Response Time: <span id="speed">--</span> ms</div>
    </div>

    <div class="card">
        <div class="metric">❌ Errors Logged: <span id="errors">0</span></div>
    </div>

    <div class="card">
        <button onclick="simulateTraffic()">Simulate User Traffic</button>
        <button onclick="simulateError()">Simulate Error</button>
    </div>

</div>

<script>
    let visits = 0;
    let errors = 0;

    function simulateTraffic() {
        visits++;
        document.getElementById("visits").innerText = visits;

        let speed = Math.floor(Math.random() * 200);
        document.getElementById("speed").innerText = speed;

        if (window.appInsights) {
            appInsights.trackEvent({ name: "UserVisit" });
        }
    }

    function simulateError() {
        errors++;
        document.getElementById("errors").innerText = errors;

        if (window.appInsights) {
            appInsights.trackException({ error: new Error("Test Error") });
        }
    }
</script>

</body>
</html>
